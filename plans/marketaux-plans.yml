description: >-
  Marketaux is subscription-tiered with a free tier. Tiers scale on daily
  request quota, articles returned per news request, and entities returned per
  stat request; the entity stats and trending endpoints require Standard or
  above. Annual billing carries a 20% discount. Custom plans (custom daily
  requests, articles per request, and SLA) are available on request.
sources:
  - https://www.marketaux.com/pricing
