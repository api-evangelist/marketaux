name: MarketAux
description: >-
  Marketaux is a global financial and stock market news API that pairs every
  article with entity recognition and sentiment analysis. It aggregates 5,000+
  news sources in 30+ languages, tracking 200,000+ entities — equities,
  indices, ETFs, mutual funds, currencies, and cryptocurrencies — across 80+
  markets. Beyond filtered news feeds, it provides entity statistics time
  series, aggregations, and trending-entity endpoints for identifying the best
  and worst performing entities in the news, with a free self-serve tier.
